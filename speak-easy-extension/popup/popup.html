<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>
        body {
            width: 360px;
            padding: 16px;
            font-family: Arial, sans-serif;
        }
        .panel {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .hidden {
            display: none;
        }
        input, button {
            padding: 8px;
            font-size: 14px;
            border-radius: 4px;
            border: 1px solid #ccc;
        }
        button {
            background-color: #4CAF50;
            color: white;
            border: none;
            cursor: pointer;
        }
        button:hover {
            background-color: #45a049;
        }
        .error {
            color: red;
            font-size: 12px;
        }
        #result {
            margin-top: 10px;
            padding: 8px;
            border: 1px solid #ddd;
            border-radius: 4px;
            background-color: #f9f9f9;
            min-height: 50px;
        }
        a {
            color: #4CAF50;
            cursor: pointer;
            text-decoration: none;
        }
        a:hover {
            text-decoration: underline;
        }
        .logout-btn {
            background-color: #f44336;
            margin-top: 10px;
        }
        .logout-btn:hover {
            background-color: #d32f2f;
        }
        .config-item {
            display: flex;
            gap: 8px;
            margin-bottom: 8px;
            align-items: center;
        }
        .config-item input {
            flex: 1;
        }
        .delete-btn {
            background-color: #f44336;
            padding: 4px 8px;
        }
        .add-btn {
            background-color: #2196F3;
            margin-top: 8px;
        }
        .config-panel {
            border-top: 1px solid #ddd;
            margin-top: 12px;
            padding-top: 12px;
        }
        .stats-btn {
            background-color: #FF9800;
        }
        #statsChart {
            width: 100%;
            height: 200px;
            margin-top: 10px;
        }
        #topCommandsList {
            margin-top: 10px;
            padding-left: 20px;
        }
    </style>
</head>
<body>
<!-- 登录面板 -->
<div id="loginPanel" class="panel">
    <h3>登录 SpeakEasy</h3>
    <input type="text" id="username" placeholder="用户名" />
    <input type="password" id="password" placeholder="密码" />
    <button id="loginBtn">登录</button>
    <div id="loginError" class="error"></div>
    <div style="font-size:12px;">没有账号？ <a href="#" id="showRegisterLink">去注册</a></div>
</div>

<!-- 注册面板 -->
<div id="registerPanel" class="panel hidden">
    <h3>注册新账号</h3>
    <input type="text" id="regUsername" placeholder="用户名" />
    <input type="password" id="regPassword" placeholder="密码" />
    <button id="registerBtn">注册</button>
    <div id="registerError" class="error"></div>
    <div style="font-size:12px;"><a href="#" id="showLoginLink">返回登录</a></div>
</div>

<!-- 语音控制面板 -->
<div id="voicePanel" class="panel hidden">
    <h2>SpeakEasy</h2>
    <button id="start-btn">开始录音</button>
    <p>点击按钮并说话</p>
    <div id="result">识别结果将显示在这里...</div>
    <div style="display: flex; gap: 8px; margin-top: 8px;">
        <button id="settingsBtn" style="background-color: #2196F3;">⚙️ 自定义命令</button>
        <button id="statsBtn" class="stats-btn">📊 统计</button>
    </div>
    <button id="logoutBtn" class="logout-btn">退出登录</button>

    <!-- 自定义命令设置面板 -->
    <div id="configPanel" class="config-panel hidden">
        <h4>自定义命令</h4>
        <div id="configList"></div>
        <div class="config-item">
            <input type="text" id="newPhrase" placeholder="语音短语，如：摸鱼" />
            <input type="text" id="newAction" placeholder="动作，如：close_tab" />
            <button id="addConfigBtn" class="add-btn">添加</button>
        </div>
        <button id="closeConfigBtn" style="background-color: #888;">关闭</button>
    </div>

    <!-- 统计面板 -->
    <div id="statsPanel" class="config-panel hidden">
        <h4>命令统计（最近7天）</h4>
        <div id="statsChart"></div>
        <h4>常用命令 Top 5</h4>
        <ul id="topCommandsList"></ul>
        <button id="closeStatsBtn" style="background-color: #888;">关闭</button>
    </div>
</div>

<script src="popup.js"></script>
</body>
</html>
